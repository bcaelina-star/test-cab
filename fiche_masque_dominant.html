<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V.A.L.E.U.R© — Votre Fiche Masque Dominant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#060C18;--navy2:#0D1526;--navy3:#111D32;
  --glass:rgba(255,255,255,.035);--gb:rgba(255,255,255,.07);
  --text:#F0EAE1;--muted:#9BB0C8;
  --gold:#C9A84C;--gold-l:#F0D080;
  --MC:#38A169;--MC2:rgba(56,161,105,.1);
  --font-d:'Cormorant Garamond',serif;--font-b:'Jost',sans-serif;
  --r:16px;--r-s:10px;
}
body{background:var(--navy);color:var(--text);font-family:var(--font-b);line-height:1.8;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pulse-dot{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes goldPulse{0%,100%{box-shadow:0 8px 40px rgba(201,168,76,.4)}50%{box-shadow:0 8px 50px rgba(201,168,76,.6)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.fu{opacity:0;animation:fadeUp .8s ease forwards}
.fu:nth-child(1){animation-delay:.1s}
.fu:nth-child(2){animation-delay:.2s}
.fu:nth-child(3){animation-delay:.3s}
.fu:nth-child(4){animation-delay:.4s}
.fu:nth-child(5){animation-delay:.5s}
.fu:nth-child(6){animation-delay:.6s}
.fu:nth-child(7){animation-delay:.7s}
.fu:nth-child(8){animation-delay:.8s}
.fu:nth-child(9){animation-delay:.9s}

/* TOP BAR */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,12,24,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05);padding:11px 24px;display:flex;align-items:center;justify-content:space-between}
.tb-logo{font-family:var(--font-d);font-size:15px;font-weight:600;letter-spacing:2.5px;color:var(--gold)}
.tb-right{font-size:10px;color:var(--muted);letter-spacing:.8px}
.tb-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:4px 14px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:500}
.tb-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse-dot 2s infinite}

/* LAYOUT */
.wrap{max-width:800px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}
.print-btn{position:fixed;bottom:24px;right:20px;z-index:200;display:flex;align-items:center;gap:8px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-family:var(--font-b);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:11px 20px;border-radius:2px;cursor:pointer;transition:all .25s;backdrop-filter:blur(10px)}
.print-btn:hover{background:rgba(201,168,76,.22);border-color:var(--gold)}

/* HERO */
.hero{padding:110px 0 36px;text-align:center}
.hero-eyebrow{font-family:var(--font-d);font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.hero-title{font-family:var(--font-d);font-size:clamp(40px,9vw,72px);font-weight:300;line-height:.95;margin-bottom:10px}
.hero-title em{font-style:italic}
.hero-sub{font-family:var(--font-d);font-size:clamp(15px,2.5vw,20px);color:var(--gold);font-style:italic;margin-bottom:32px}
.hero-name{font-size:13px;color:var(--muted);letter-spacing:1px}

/* CARDS */
.card{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);padding:36px 32px;margin:20px 0;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--MC2) 0%,transparent 60%);pointer-events:none}
.card-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--MC);font-weight:600;margin-bottom:10px;display:block;position:relative;z-index:1}
.card-title{font-family:var(--font-d);font-size:clamp(20px,3.5vw,26px);font-weight:600;color:var(--text);margin-bottom:18px;line-height:1.2;position:relative;z-index:1}
.card-title em{color:var(--MC);font-style:italic}
.card-body{font-size:15px;color:rgba(240,234,225,.82);line-height:1.85;position:relative;z-index:1}
.card-gold{background:linear-gradient(135deg,rgba(201,168,76,.07) 0%,rgba(201,168,76,.02) 100%);border-color:rgba(201,168,76,.2)}
.card-gold::before{background:linear-gradient(135deg,rgba(201,168,76,.06) 0%,transparent 60%)}
.card-gold .card-label{color:var(--gold)}

/* MÉCANISME */
.meca-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;position:relative;z-index:1}
.meca-item{padding:16px;background:rgba(255,255,255,.025);border-radius:var(--r-s);border-left:3px solid var(--MC)}
.meca-item.red-border{border-left-color:#E53E3E}
.meca-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.meca-text{font-size:13px;color:rgba(240,234,225,.78);line-height:1.65}

/* PENSÉES */
.thought{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-s);padding:14px 18px;position:relative;padding-left:32px;margin-bottom:8px}
.thought::before{content:'"';position:absolute;left:12px;top:8px;font-family:var(--font-d);font-size:24px;color:var(--MC);opacity:.5;line-height:1}
.thought-text{font-family:var(--font-d);font-size:15px;color:rgba(240,234,225,.85);font-style:italic;line-height:1.65}

/* DÉCLENCHEURS */
.trigger-list{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1}
.trigger-item{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;background:rgba(255,255,255,.025);border-radius:var(--r-s);font-size:14px;color:rgba(240,234,225,.8);line-height:1.65}
.trigger-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* COÛTS */
.cout-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative;z-index:1}
.cout-item{padding:14px 16px;background:rgba(229,62,62,.06);border:1px solid rgba(229,62,62,.15);border-radius:var(--r-s)}
.cout-num{font-family:var(--font-d);font-size:22px;font-weight:600;color:rgba(229,62,62,.6);margin-bottom:4px;line-height:1}
.cout-text{font-size:12px;color:rgba(240,200,195,.7);line-height:1.5}

/* ÉTAPES */
.step-list{display:flex;flex-direction:column;gap:0;position:relative;z-index:1}
.step-row{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.step-row:last-child{border-bottom:none}
.step-row.highlight{background:rgba(56,161,105,.06);border-radius:var(--r-s);margin:4px -10px;padding:16px 10px;border-bottom-color:transparent}
.step-circ{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;font-weight:700;flex-shrink:0;border:2px solid}
.step-name{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:3px}
.step-desc{font-size:13px;color:rgba(185,210,230,.82);line-height:1.65}
.step-note{font-size:12px;font-style:italic;margin-top:5px;line-height:1.5}

/* 21 JOURS */
.jours-intro{font-size:14px;color:rgba(240,234,225,.7);line-height:1.85;margin-bottom:20px;position:relative;z-index:1}
.semaine{margin-bottom:24px;position:relative;z-index:1}
.semaine-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.semaine-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.defis-grid{display:flex;flex-direction:column;gap:7px}
.defi-row{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;background:rgba(255,255,255,.02);border-radius:var(--r-s);border:1px solid rgba(255,255,255,.04)}
.defi-day{font-family:var(--font-d);font-size:13px;font-weight:600;color:var(--MC);flex-shrink:0;min-width:44px}
.defi-text{font-size:13px;color:rgba(240,234,225,.75);line-height:1.6}

/* SIGNAUX */
.signal-list{display:flex;flex-direction:column;gap:9px;position:relative;z-index:1}
.signal-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(56,161,105,.05);border-radius:var(--r-s);border:1px solid rgba(56,161,105,.12)}
.signal-check{width:20px;height:20px;border-radius:50%;background:rgba(56,161,105,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--MC)}
.signal-text{font-size:13px;color:rgba(200,235,215,.85);line-height:1.55}

/* CTA */
.cta-card{text-align:center;background:var(--MC2);border:1px solid color-mix(in srgb,var(--MC) 25%,transparent);border-radius:var(--r);padding:48px 32px;margin:20px 0;position:relative;overflow:hidden}
.cta-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.btn-gold{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#C9A84C 0%,#F0D080 50%,#C9A84C 100%);background-size:200% 100%;color:#06090F;font-family:var(--font-b);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:18px 48px;border-radius:2px;text-decoration:none;border:none;cursor:pointer;position:relative;overflow:hidden;animation:goldPulse 3s ease infinite;transition:all .35s}
.btn-gold::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 3s ease infinite}
.btn-gold:hover{transform:translateY(-2px);background-position:100% 0}

/* PRINT */
@media print{
  .top-bar,.print-btn,.cta-card .btn-gold{display:none!important}
  body{background:#fff!important;color:#1a1a1a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .wrap{max-width:none;padding:0 16px}
  .card{break-inside:avoid;border:1px solid rgba(0,0,0,.1)!important}
  .hero{padding:16px 0 24px}
}
@media(max-width:600px){
  .meca-grid,.cout-grid{grid-template-columns:1fr}
  .card{padding:24px 18px}
}

/* ── PROGRAMME DÉFIS INTERACTIF ── */
.prog-header{text-align:center;padding:96px 0 40px}
.prog-eyebrow{font-family:var(--font-d);font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.prog-title{font-family:var(--font-d);font-size:clamp(38px,8vw,68px);font-weight:300;line-height:.95;margin-bottom:10px}
.prog-sub{font-family:var(--font-d);font-size:clamp(15px,2.5vw,20px);color:var(--gold);font-style:italic}

/* Progress global */
.global-progress{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:24px 28px;margin:0 0 20px}
.gp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.gp-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:600}
.gp-count{font-family:var(--font-d);font-size:26px;font-weight:300;color:var(--gold)}
.gp-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.gp-fill{height:100%;background:linear-gradient(90deg,var(--MC),var(--gold));border-radius:2px;transition:width .6s ease}

/* Mode d'emploi */
.mode-card{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);border-radius:var(--r);padding:28px 28px;margin:0 0 20px}
.mode-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
.mode-step{text-align:center;padding:16px 12px;background:rgba(255,255,255,.025);border-radius:var(--r-s)}
.mode-step-icon{font-size:22px;margin-bottom:8px}
.mode-step-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.mode-step-desc{font-size:12px;color:var(--muted);line-height:1.55}

/* Préparation accordéon */
.prep-toggle{width:100%;display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-s);cursor:pointer;transition:all .2s;text-align:left}
.prep-toggle:hover{background:rgba(255,255,255,.04)}
.prep-toggle-icon{font-size:14px;flex-shrink:0}
.prep-toggle-txt{font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1}
.prep-toggle-chevron{font-size:12px;color:var(--muted);transition:transform .3s}
.prep-body{display:none;padding:16px 18px 0;border:1px solid rgba(255,255,255,.05);border-top:none;border-radius:0 0 var(--r-s) var(--r-s);background:rgba(255,255,255,.015)}
.prep-body.open{display:block}
.prep-section{margin-bottom:14px}
.prep-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.prep-instruction{font-size:13px;color:rgba(240,234,225,.75);line-height:1.75}
.breath-steps{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.breath-step{padding:10px 12px;background:rgba(255,255,255,.025);border-radius:var(--r-s);text-align:center}
.breath-num{font-family:var(--font-d);font-size:20px;font-weight:600;color:var(--MC);line-height:1}
.breath-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.obs-quote{font-family:var(--font-d);font-size:14px;font-style:italic;color:rgba(240,234,225,.7);line-height:1.7;padding:10px 14px;border-left:2px solid rgba(201,168,76,.3);margin-top:8px}

/* Semaine */
.semaine-header{margin:28px 0 14px}
.semaine-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 16px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.semaine-theme{font-family:var(--font-d);font-size:clamp(18px,3vw,24px);font-weight:300;color:var(--text);line-height:1.3}
.semaine-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-top:6px}

/* Carte défi */
.defi-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:22px 22px 18px;margin-bottom:8px;transition:all .25s;position:relative}
.defi-card.done{background:rgba(56,161,105,.04);border-color:rgba(56,161,105,.18)}
.defi-card-top{display:flex;align-items:flex-start;gap:14px}
.defi-num{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;font-weight:600;color:var(--muted);flex-shrink:0;transition:all .3s}
.defi-card.done .defi-num{background:rgba(56,161,105,.2);border-color:rgba(56,161,105,.4);color:#48BB78}
.defi-content{flex:1}
.defi-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.defi-card.done .defi-label{color:rgba(56,161,105,.7)}
.defi-text{font-size:14px;color:rgba(240,234,225,.85);line-height:1.7}
.defi-card.done .defi-text{color:rgba(240,234,225,.55);text-decoration:line-through;text-decoration-color:rgba(56,161,105,.3)}
.defi-actions{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
.defi-check-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;background:rgba(56,161,105,.08);border:1px solid rgba(56,161,105,.2);border-radius:2px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(56,161,105,.8);transition:all .2s}
.defi-check-btn:hover{background:rgba(56,161,105,.15);border-color:rgba(56,161,105,.35)}
.defi-card.done .defi-check-btn{background:rgba(56,161,105,.15);border-color:rgba(56,161,105,.35);color:#48BB78}

/* Encouragement */
.encouragement{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.18);border-radius:var(--r);padding:28px 28px;margin:20px 0;position:relative;overflow:hidden}
.encouragement::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.enc-icon{font-size:28px;margin-bottom:10px}
.enc-title{font-family:var(--font-d);font-size:clamp(16px,2.5vw,20px);font-weight:300;color:var(--text);line-height:1.35;margin-bottom:8px}
.enc-body{font-size:13px;color:rgba(240,234,225,.62);line-height:1.8}

/* Message final */
.message-final{text-align:center;padding:40px 28px;background:linear-gradient(135deg,rgba(var(--MCr,56),var(--MCg,161),var(--MCb,105),.07),transparent);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);margin:20px 0}
.mf-quote{font-family:var(--font-d);font-size:clamp(18px,3vw,24px);font-style:italic;font-weight:300;color:var(--text);line-height:1.5;margin-bottom:14px}
.mf-sig{font-size:12px;color:var(--muted);letter-spacing:1px}

@media(max-width:600px){
  .mode-steps{grid-template-columns:1fr}
  .breath-steps{grid-template-columns:1fr 1fr}
}
</style>
<style>
@media print{
  body::before{
    content:attr(data-wm) " · Document confidentiel · Ne pas diffuser";
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(-35deg);
    font-size:16px;color:rgba(0,0,0,.07);white-space:nowrap;
    pointer-events:none;z-index:9999;letter-spacing:2px;font-family:sans-serif;
  }
}
</style>
</head>
<body>
<script>
/* ══ V.A.L.E.U.R© — CONTRÔLE D'ACCÈS SESSION ══ */
(function(){
  var params  = new URLSearchParams(location.search);
  var admin   = params.get('admin') === 'VALEUR-ADMIN-2025';
  if(admin) return;

  var email   = (params.get('email')   || '').toLowerCase().trim();
  var session = (params.get('session') || '').trim();

  if(!email || !session || !session.startsWith('cs_')){
    document.documentElement.style.visibility = 'hidden';
    setTimeout(function(){
      window.location.href =
        'https://parcours.valeur.psyh.fr/portail_client.html?msg=acces_requis';
    }, 100);
    return;
  }

  /* Cache sessionStorage (par onglet — efface à la fermeture) */
  var cacheKey = 'vl_' + session.slice(-12);
  var cached   = sessionStorage.getItem(cacheKey);

  if(cached === 'ok'){
    applyWatermark(email);
    return;
  }
  if(cached === 'no'){
    document.documentElement.style.visibility = 'hidden';
    window.location.href = 'https://parcours.valeur.psyh.fr/portail_client.html?msg=acces_requis';
    return;
  }

  /* Validation API */
  document.documentElement.style.visibility = 'hidden';
  fetch(
    'https://valeur-backend-api.vercel.app/api/check-access' +
    '?email=' + encodeURIComponent(email) +
    '&session=' + encodeURIComponent(session)
  )
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.valid){
        sessionStorage.setItem(cacheKey, 'ok');
        document.documentElement.style.visibility = '';
        applyWatermark(email);
      } else {
        sessionStorage.setItem(cacheKey, 'no');
        window.location.href = 'https://parcours.valeur.psyh.fr/portail_client.html?msg=acces_requis';
      }
    })
    .catch(function(){
      /* API indisponible — dégrader gracieusement (ne pas bloquer un client payant) */
      document.documentElement.style.visibility = '';
      applyWatermark(email);
    });

  function applyWatermark(em){
    document.addEventListener('DOMContentLoaded', function(){
      if(!document.body) return;
      var wm = document.createElement('div');
      wm.setAttribute('aria-hidden','true');
      wm.style.cssText = [
        'position:fixed','inset:0','pointer-events:none','z-index:99999',
        'display:flex','align-items:center','justify-content:center','overflow:hidden'
      ].join(';');
      wm.innerHTML = '<div style="transform:rotate(-35deg);font-size:12px;' +
        'color:rgba(255,255,255,.025);white-space:nowrap;letter-spacing:3px;' +
        'font-family:sans-serif;font-weight:300;-webkit-user-select:none;user-select:none">' +

function loadData(){
  const url = new URLSearchParams(window.location.search);
  const isAdmin = url.get('admin') === 'VALEUR-ADMIN-2025';

  // Mode preview ou admin — bypass
  if(url.get('preview') || isAdmin){
    const key = url.get('preview') || url.get('masque') || 'vert';
    return { dominant:key, prenom:'Sophie', session:null };
  }

  // PRIORITÉ 1 : masque depuis URL ?masque=... (nouveau système session)
  const masqueUrl  = url.get('masque');
  const prenomLS   = localStorage.getItem('valeur_prenom') || '';
  const sessionUrl = url.get('session') || '';

  if(masqueUrl && ['rouge','orange','jaune','vert','bleu','indigo','violet'].includes(masqueUrl)){
    return { dominant:masqueUrl, prenom:prenomLS, session:sessionUrl };
  }

  // PRIORITÉ 2 : localStorage (ancien système)
  const s = localStorage.getItem('valeur_scores');
  if(s){
    const scores = JSON.parse(s);
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    return { dominant:sorted[0][0], prenom:prenomLS, session:sessionUrl };
  }

  return null;
}

/* ── Sauvegarde des défis accomplis ── */
function getProgress(dominant){
  try{ return JSON.parse(sessionStorage.getItem('defis_'+dominant)||'{}'); }catch(e){ return {}; }
}
function saveProgress(dominant, day, done){
  const p = getProgress(dominant);
  p[day] = done;
  try{ sessionStorage.setItem('defis_'+dominant, JSON.stringify(p)); }catch(e){}
}
function countDone(dominant){
  return Object.values(getProgress(dominant)).filter(Boolean).length;
}

function togglePrep(id){
  const body = document.getElementById('prep-body-'+id);
  const chev = document.getElementById('prep-chev-'+id);
  if(!body) return;
  const open = body.classList.toggle('open');
  if(chev) chev.textContent = open ? '▲' : '▼';
}

function toggleDefi(dominant, day){
  const p   = getProgress(dominant);
  const was = p[day] || false;
  saveProgress(dominant, day, !was);
  // Mettre à jour la carte
  const card = document.getElementById('defi-card-'+day);
  if(card) card.classList.toggle('done', !was);
  const btn  = document.getElementById('defi-btn-'+day);
  if(btn)  btn.textContent = !was ? '✓ Accompli' : 'Marquer comme fait';
  const num  = document.getElementById('defi-num-'+day);
  if(num)  num.textContent = !was ? '✓' : day;
  // Mettre à jour la barre globale
  updateGlobalBar(dominant);
}

function updateGlobalBar(dominant){
  const done  = countDone(dominant);
  const total = 21;
  const fill  = document.getElementById('gp-fill');
  const count = document.getElementById('gp-count');
  if(fill)  fill.style.width  = Math.round(done/total*100)+'%';
  if(count) count.textContent = done+' / '+total;
}

/* ── Construction des semaines ── */
function buildSemaine(dominant, semaine, num, theme, desc, defis, r, g, b){
  const progress = getProgress(dominant);
  const ENCOURAGEMENTS_MID = [
    `<div class="encouragement">
      <div class="enc-icon">✦</div>
      <div class="enc-title">Vous avez fait le plus difficile — <em>commencer.</em></div>
      <div class="enc-body">Ce que vous avez observé cette semaine n'est pas un jugement. C'est une information. Votre masque a fonctionné pendant des années parce qu'il vous protégeait. Ces 7 jours ont commencé à montrer qu'une autre façon d'être est possible. Continuez à votre rythme.</div>
    </div>`,
    `<div class="encouragement">
      <div class="enc-icon">◈</div>
      <div class="enc-title">La deuxième semaine est souvent celle de la <em>résistance.</em></div>
      <div class="enc-body">Si vous avez senti de l'inconfort, c'est le signe que quelque chose se transforme vraiment. Le masque ne lâche pas facilement — il a mis des années à se construire. La résistance que vous ressentez est la preuve que vous touchez à quelque chose de réel. Continuez.</div>
    </div>`
  ];

  const defisHTML = defis.map((defi, i) => {
    const day    = (semaine-1)*7 + i + 1;
    const done   = progress[day] || false;
    const dayNum = String(day).padStart(2,'0');
    return `
    <div class="defi-card${done?' done':''}" id="defi-card-${day}">
      <div class="defi-card-top">
        <div class="defi-num" id="defi-num-${day}">${done?'✓':day}</div>
        <div class="defi-content">
          <div class="defi-label">Jour ${dayNum}</div>
          <div class="defi-text">${defi}</div>
          ${prepBlock('d'+day)}
        </div>
      </div>
      <div class="defi-actions">
        <button class="defi-check-btn" id="defi-btn-${day}" onclick="toggleDefi('${dominant}',${day})">
          ${done ? '✓ Accompli' : 'Marquer comme fait'}
        </button>
      </div>
    </div>`;
  }).join('');

  const encouragement = semaine < 3 ? ENCOURAGEMENTS_MID[semaine-1] : '';

  return `
  <div class="semaine-header">
    <div class="semaine-badge">Semaine ${num} · Jours ${(semaine-1)*7+1}–${semaine*7}</div>
    <div class="semaine-theme">${theme}</div>
    <div class="semaine-desc">${desc}</div>
  </div>
  <div class="defis-grid">${defisHTML}</div>
  ${encouragement}`;
}
